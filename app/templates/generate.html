<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate — Operation Next</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: #f4f5f7; color: #1a1a2e; min-height: 100vh; }
    header { background: #1a1a2e; color: white; padding: 16px 32px;
             display: flex; align-items: center; gap: 20px; }
    .back-btn { color: white; text-decoration: none; opacity: 0.6;
                font-size: 14px; transition: opacity 0.15s; }
    .back-btn:hover { opacity: 1; }
    header h1 { font-size: 20px; font-weight: 600; }
    .container { max-width: 1100px; margin: 32px auto; padding: 0 16px; }
    .card { background: white; border-radius: 10px; padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 20px; }
    .job-meta { display: flex; gap: 24px; flex-wrap: wrap; align-items: center; }
    .meta-item { display: flex; flex-direction: column; gap: 2px; }
    .meta-label { font-size: 11px; font-weight: 700; text-transform: uppercase;
                  letter-spacing: 0.05em; color: #9ca3af; }
    .meta-value { font-size: 14px; font-weight: 600; color: #1a1a2e; }
    .meta-url { font-size: 13px; color: #2563eb; text-decoration: none; }
    .meta-url:hover { text-decoration: underline; }
    .cv-badge { display: inline-block; padding: 2px 8px; border-radius: 10px;
                font-size: 12px; font-weight: 600; background: #e0e7ff; color: #3730a3; }
    .action-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .btn-primary { padding: 10px 28px; background: #1a1a2e; color: white;
                   border: none; border-radius: 6px; font-size: 14px; font-weight: 500;
                   cursor: pointer; transition: opacity 0.15s; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary { padding: 9px 20px; background: white; color: #1a1a2e;
                     border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px;
                     font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .btn-secondary:hover { border-color: #1a1a2e; }
    #loading { display: none; align-items: center; gap: 12px; }
    .spinner { width: 18px; height: 18px; border: 2px solid #e5e7eb;
               border-top-color: #2563eb; border-radius: 50%;
               animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: #6b7280; font-size: 14px; }
    .error-box { background: #fef2f2; border: 1px solid #fca5a5; border-radius: 8px;
                 padding: 12px 16px; color: #991b1b; font-size: 14px; display: none; }
    .output-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 700px) { .output-grid { grid-template-columns: 1fr; } }
    .output-card { background: white; border-radius: 10px;
                   box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; display: flex; flex-direction: column; }
    .output-header { display: flex; justify-content: space-between; align-items: center;
                     padding: 14px 20px; border-bottom: 1px solid #e5e7eb; background: #f8f9fb;
                     gap: 8px; flex-wrap: wrap; }
    .output-title { font-size: 13px; font-weight: 700; text-transform: uppercase;
                    letter-spacing: 0.05em; color: #555; }
    .header-btns { display: flex; gap: 8px; }
    .btn-sm { padding: 5px 14px; background: white; border: 1px solid #d1d5db;
              border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer;
              transition: all 0.15s; color: #374151; }
    .btn-sm:hover { background: #1a1a2e; color: white; border-color: #1a1a2e; }
    .btn-sm.revert { color: #6b7280; border-color: #e5e7eb; display: none; }
    .btn-sm.revert:hover { background: #1a1a2e; color: white; border-color: #1a1a2e; }
    .output-body { width: 100%; flex: 1; padding: 20px; font-size: 14px; line-height: 1.7;
                   border: none; outline: none; resize: vertical; min-height: 400px;
                   font-family: inherit; color: #1a1a2e; background: white; }
  </style>
</head>
<body>

<header>
  <a class="back-btn" href="/">&#8592; Tillbaka</a>
  <h1>Operation Next &#8212; Generera dokument</h1>
</header>

<div class="container">

  <div class="card">
    <div class="job-meta">
      <div class="meta-item">
        <span class="meta-label">F&#246;retag</span>
        <span class="meta-value">{{ company }}</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Roll</span>
        <span class="meta-value">{{ role }}</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">CV-bas</span>
        <span class="cv-badge">{{ cv_base }}</span>
      </div>
      {% if location %}
      <div class="meta-item">
        <span class="meta-label">Plats</span>
        <span class="meta-value">{{ location }}</span>
      </div>
      {% endif %}
      <div class="meta-item">
        <span class="meta-label">Annons</span>
        <a class="meta-url" href="{{ url }}" target="_blank">&#214;ppna &#8599;</a>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="action-row">
      <button class="btn-primary" id="generate-btn" onclick="generate()">Generera CV + Personligt brev</button>
      <button class="btn-secondary" id="regenerate-btn" onclick="regenerate()" style="display:none">Generera om</button>
      <div id="loading">
        <div class="spinner"></div>
        <p>Claude l&#228;ser annons, CV-bas och portfolio...</p>
      </div>
    </div>
    <div class="error-box" id="error-box" style="margin-top:12px"></div>
  </div>

  <div class="output-grid" id="output-section" style="display:none">
    <div class="output-card">
      <div class="output-header">
        <span class="output-title">CV &#8212; Svenska</span>
        <div class="header-btns">
          <button class="btn-sm revert" id="revert-cv" onclick="revertCv()">&#197;terst&#228;ll</button>
          <button class="btn-sm" onclick="saveField('cv')">Spara</button>
          <button class="btn-sm" onclick="copyField('cv', this)">Kopiera</button>
        </div>
      </div>
      <textarea class="output-body" id="cv-output" spellcheck="false"></textarea>
    </div>
    <div class="output-card">
      <div class="output-header">
        <span class="output-title">Personligt brev</span>
        <div class="header-btns">
          <button class="btn-sm revert" id="revert-cl" onclick="revertCl()">&#197;terst&#228;ll</button>
          <button class="btn-sm" onclick="saveField('cl')">Spara</button>
          <button class="btn-sm" onclick="copyField('cl', this)">Kopiera</button>
        </div>
      </div>
      <textarea class="output-body" id="cl-output" spellcheck="false"></textarea>
    </div>
  </div>

</div>

<script>
  var JOB_URL   = {{ url | tojson }};
  var CV_BASE   = {{ cv_base | tojson }};
  var STORE_KEY = "next_out_" + JOB_URL.slice(-40);

  var origCv = "", origCl = "";

  (function () {
    try {
      var stored = JSON.parse(localStorage.getItem(STORE_KEY) || "null");
      if (stored && stored.cv) {
        origCv = stored.orig_cv || stored.cv;
        origCl = stored.orig_cl || stored.cover_letter || "";
        document.getElementById("cv-output").value = stored.cv;
        document.getElementById("cl-output").value = stored.cover_letter || "";
        showOutput();
      }
    } catch (e) {}
  })();

  function showOutput() {
    document.getElementById("output-section").style.display = "grid";
    document.getElementById("regenerate-btn").style.display = "inline-block";
    document.getElementById("generate-btn").style.display = "none";
    updateRevertButtons();
  }

  function updateRevertButtons() {
    var cv = document.getElementById("cv-output").value;
    var cl = document.getElementById("cl-output").value;
    document.getElementById("revert-cv").style.display = (cv !== origCv) ? "inline-block" : "none";
    document.getElementById("revert-cl").style.display = (cl !== origCl) ? "inline-block" : "none";
  }

  document.getElementById("cv-output").addEventListener("input", updateRevertButtons);
  document.getElementById("cl-output").addEventListener("input", updateRevertButtons);

  function saveField(which) {
    var stored = {};
    try { stored = JSON.parse(localStorage.getItem(STORE_KEY) || "{}"); } catch (e) {}
    if (which === "cv") {
      stored.cv = document.getElementById("cv-output").value;
    } else {
      stored.cover_letter = document.getElementById("cl-output").value;
    }
    stored.orig_cv = origCv;
    stored.orig_cl = origCl;
    localStorage.setItem(STORE_KEY, JSON.stringify(stored));
    updateRevertButtons();
  }

  function revertCv() {
    document.getElementById("cv-output").value = origCv;
    updateRevertButtons();
  }

  function revertCl() {
    document.getElementById("cl-output").value = origCl;
    updateRevertButtons();
  }

  function copyField(which, btn) {
    var text = which === "cv"
      ? document.getElementById("cv-output").value
      : document.getElementById("cl-output").value;
    navigator.clipboard.writeText(text).then(function() {
      var orig = btn.textContent;
      btn.textContent = "Kopierat!";
      setTimeout(function() { btn.textContent = orig; }, 1800);
    });
  }

  function generate() {
    document.getElementById("generate-btn").disabled = true;
    document.getElementById("loading").style.display = "flex";
    document.getElementById("error-box").style.display = "none";

    fetch("/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url: JOB_URL, cv_base: CV_BASE }),
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.error) {
        document.getElementById("error-box").textContent = data.error;
        document.getElementById("error-box").style.display = "block";
        return;
      }
      origCv = data.cv || "";
      origCl = data.cover_letter || "";
      document.getElementById("cv-output").value = origCv;
      document.getElementById("cl-output").value = origCl;
      localStorage.setItem(STORE_KEY, JSON.stringify({
        cv: origCv, cover_letter: origCl, orig_cv: origCv, orig_cl: origCl
      }));
      showOutput();
    })
    .catch(function(e) {
      document.getElementById("error-box").textContent = "Fel: " + e.message;
      document.getElementById("error-box").style.display = "block";
    })
    .finally(function() {
      document.getElementById("generate-btn").disabled = false;
      document.getElementById("loading").style.display = "none";
    });
  }

  function regenerate() {
    localStorage.removeItem(STORE_KEY);
    document.getElementById("output-section").style.display = "none";
    document.getElementById("generate-btn").style.display = "inline-block";
    document.getElementById("regenerate-btn").style.display = "none";
    generate();
  }
</script>

</body>
</html>
